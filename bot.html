<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الجيكو</title>
    <style>
        body { font-family: sans-serif; background: #0e0e0e; color: #00ff00; text-align: center; padding: 20px; }
        .box { border: 2px solid #0088cc; padding: 20px; border-radius: 15px; background: #1a1a1a; display: inline-block; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        button { width: 95%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🃏 تشغيل بوت الجيكو</h2>
        <form action="/run" method="post">
            <input type="text" name="token" placeholder="ضع توكن البوت هنا" required>
            <input type="text" name="my_id" placeholder="ضع الأيدي (ID) هنا" required>
            <button type="submit">تحديث وتشغيل البوت 🚀</button>
        </form>
    </div>
</body>
</html>
